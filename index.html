<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My World Cup Site</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
    }

    header{
      background:linear-gradient(135deg,#2563eb,#0ea5e9);
      padding:40px 20px;
      text-align:center;
    }

    h1{
      font-size:32px;
    }

    .container{
      padding:20px;
    }

    .card{
      background:#1e293b;
      border-radius:18px;
      padding:20px;
      margin-bottom:20px;
    }

    .card h2{
      margin-bottom:10px;
    }

    .btn{
      display:block;
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#2563eb;
      color:white;
      font-size:18px;
      margin-top:15px;
    }
  </style>
</head>

<body>

<header>
<h1>🏆 World Cup 2026</h1>
<p>My Mobile Website</p>
</header>

<div class="container">

<div class="card">
<h2>Today's Match</h2>
<p>USA 🇺🇸 vs Japan 🇯🇵</p>
<button class="btn">View Details</button>
</div>

<div class="card">
<h2>Groups</h2>
<p>48 Teams</p>
</div>

<div class="card">
<h2>Statistics</h2>
<p>104 Matches</p>
</div>

</div>

</body>
</html>
